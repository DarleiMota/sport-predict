version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sportpredict-postgres
    environment:
      POSTGRES_DB: sportpredict
      POSTGRES_USER: sportpredict
      POSTGRES_PASSWORD: sportpredict123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - sportpredict-network

volumes:
  postgres_data:

networks:
  sportpredict-network:
    driver: bridge
