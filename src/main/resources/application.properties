# Configuracao da Aplicacao
spring.application.name=sportpredict

# Configuracao do Servidor
server.port=8080

# Configuracao do PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/sportpredict
spring.datasource.username=sportpredict
spring.datasource.password=sportpredict123
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuracao do JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Configuracao de logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Configuracao de timezone
spring.jpa.properties.hibernate.jdbc.time_zone=America/Sao_Paulo

# Configuracao API Externa
football.api.base-url=https://api.football-data.org/v4
football.api.key=5a4bced9f1a74da9acd86f87a3c1f8af
